<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revo Apps | Sign Up</title>
    <link rel="icon" href="favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding-top: 10px;
            padding-bottom: 25px;
        }

        .container {
            padding: 20px;
            background: #ffffff;
            color: #000000;
            height: 630px;
            width: 500px;
            text-align: center;
            border: #aaa solid 3px;
            border-radius: 40px;
            box-shadow: -7px 10px 10px #555;
        }

        h1 {
            line-height: 50px;
        }

        input {
            height: 50px;
            width: 30ch;
            font-size: 20px;
            padding: 10px;
            color: #333;
            border: solid #555 2px;
            border-radius: 5px;
            box-shadow: -3px 3px 3px #aaa;
        }

        input::placeholder {
            font-size: 20px;
        }

        input:focus {
            border: solid #07f;
        }

        button {
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #ff6b6b;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        a, a:visited {
            color: #00f;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Sign Up</h1>
        <p>for Revo Apps</p><br>

        <form id="signup">
            <input type="text" placeholder="First Name" required><br><br>
            <input type="text" placeholder="Last name" required><br><br>
            <input type="email" placeholder="Email Address" required><br><br>
            <input type="tel" placeholder="Phone Number (Optional)"><br><br>
            <input type="password" placeholder="Password" required><br><br>
            <input type="password" placeholder="Confirm Password" required><br><br>
            <button type="submit">Sign Up</button>
        </form><br>
        Already have an account? <a href="https://revo-apps.github.io/login/">Log in</a>

    </div>

    <script>

        setInterval(() => {
            document.getElementById("signup").reset();
        }, 6000);

    </script>

</body>

</html>
